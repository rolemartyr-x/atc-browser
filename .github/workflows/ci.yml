name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # npm bug 4828: the committed lockfile was generated on Windows and so
      # doesn't include the Linux rolldown native binding that vitest 4 needs.
      # `npm ci` AND `npm install` both honor the lockfile and fail. The fix
      # the error message itself prescribes: drop the lockfile and reinstall
      # fresh on this platform so the optional native deps resolve cleanly.
      - run: rm -f package-lock.json
      - run: npm install

      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
