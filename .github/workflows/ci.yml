name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      # Use `npm install` rather than `npm ci`: npm 10's `ci` strict-respects
      # the lockfile and skips optional native deps that weren't resolved when
      # the lockfile was generated (npm bug 4828). vitest 4 / rolldown ships
      # platform-specific native bindings as optional deps, so `npm ci` fails
      # to install `@rolldown/binding-linux-x64-gnu` here. `npm install`
      # resolves and installs them at runtime.
      - run: npm install

      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
