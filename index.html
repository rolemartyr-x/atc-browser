<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>atc-browser</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header id="hud-top">
        <div id="hud-clock">00:00</div>
        <div id="hud-selected">--</div>
        <div id="hud-stats">
          <span><span class="hud-label">SCORE</span> <span id="hud-score">0</span></span>
          <span><span class="hud-label">CONFLICTS</span> <span id="hud-conflicts">0</span></span>
          <span><span class="hud-label">STATUS</span> <span id="hud-status">running</span></span>
          <button id="settings-toggle" type="button" aria-label="Settings" title="Settings">⚙</button>
        </div>
      </header>
      <canvas id="scope"></canvas>
      <aside id="strips"></aside>
      <footer id="hud-bottom">
        <div id="hud-response"></div>
        <div id="hud-cmdline">
          <span class="prompt">CMD&gt;</span>
          <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" autofocus />
        </div>
      </footer>
      <div id="click-menu" hidden></div>
      <div id="settings-modal" hidden role="dialog" aria-labelledby="settings-title">
        <div class="modal-card">
          <h2 id="settings-title">Settings</h2>
          <label class="setting-row">
            <input id="setting-sfx" type="checkbox" />
            <span>Sound effects</span>
          </label>
          <label class="setting-row">
            <input id="setting-tts" type="checkbox" />
            <span>Voice readbacks (TTS)</span>
          </label>
          <label class="setting-row">
            <span>Volume</span>
            <input id="setting-volume" type="range" min="0" max="100" />
            <span id="setting-volume-display" class="volume-display">80%</span>
          </label>
          <label class="setting-row">
            <span>Voice</span>
            <select id="setting-voice"></select>
          </label>
          <div class="modal-actions">
            <button id="settings-close" type="button">Close</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/app/main.ts"></script>
  </body>
</html>
